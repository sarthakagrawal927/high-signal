name = "high-signal-web"
main = ".open-next/worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
assets = { directory = ".open-next/assets", binding = "ASSETS" }

[observability]
enabled = true
head_sampling_rate = 0.1

[limits]
cpu_ms = 30000

[[unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 100, period = 60 }

[vars]
NODE_ENV = "production"
NEXT_PUBLIC_SAASMAKER_API_KEY = "pk_3eb4816ef2179c25f364315aa1c3148a88e8004bfa5e5235"
NEXT_PUBLIC_API_BASE = "https://high-signal-api.sarthakagrawal927.workers.dev"
NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY = "pk_test_ZmFpci1ob3JuZXQtMjcuY2xlcmsuYWNjb3VudHMuZGV2JA"
# CF Access — set per app from Zero Trust dashboard:
#   AUD: copy from Application → Overview
#   TEAM_DOMAIN: <your-team>.cloudflareaccess.com
# CF_ACCESS_AUD = ""
# CF_ACCESS_TEAM_DOMAIN = ""
# ADMIN_ALLOWED_EMAILS = "sarthakagrawal927@gmail.com"
# ADMIN_TOKEN — set as secret: `wrangler secret put ADMIN_TOKEN`

[[services]]
binding = "API"
service = "high-signal-api"
