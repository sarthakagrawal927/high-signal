name: cron-ingest

on:
  schedule:
    - cron: "0 6 * * *"  # daily 06:00 UTC
  workflow_dispatch:
    inputs:
      source:
        description: source filter (all|news|edgar|reddit|ir|github|youtube|gov|gdelt|hkex)
        type: string
        default: all
      days:
        description: lookback days
        type: string
        default: "1"

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: python/ingest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: uv sync
      - name: ingest
        env:
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
          API_BASE: ${{ secrets.API_BASE }}
          AI_BASE_URL: https://free-ai-gateway.sarthakagrawal927.workers.dev/v1
          AI_API_KEY: open
          AI_MODEL: auto
          AI_PROJECT_ID: high-signal
          SEC_USER_AGENT: "high-signal sarthakagrawal927@gmail.com"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          uv run python -m high_signal_ingest.pipeline \
            --source "${{ inputs.source || 'all' }}" \
            --days "${{ inputs.days || '1' }}"
