name: backfill

on:
  workflow_dispatch:
    inputs:
      start:
        description: ISO start date (e.g. 2026-02-25)
        type: string
        required: true
      end:
        description: ISO end date (e.g. 2026-04-25)
        type: string
        required: true
      sources:
        description: csv (gdelt,edgar)
        type: string
        default: gdelt
      chunk_days:
        description: window chunk size
        type: string
        default: "7"

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    defaults:
      run:
        working-directory: python/ingest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: uv sync
      - name: backfill
        env:
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
          API_BASE: ${{ secrets.API_BASE }}
          AI_BASE_URL: https://free-ai-gateway.sarthakagrawal927.workers.dev/v1
          AI_API_KEY: open
          AI_MODEL: auto
          AI_PROJECT_ID: high-signal
          SEC_USER_AGENT: "high-signal sarthakagrawal927@gmail.com"
        run: |
          uv run python -m high_signal_ingest.backfill \
            --start "${{ inputs.start }}" \
            --end "${{ inputs.end }}" \
            --sources "${{ inputs.sources }}" \
            --chunk-days "${{ inputs.chunk_days }}"
