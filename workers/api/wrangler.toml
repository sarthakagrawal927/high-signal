name = "high-signal-api"
main = "src/index.ts"
compatibility_date = "2026-04-01"

[observability]
enabled = true
head_sampling_rate = 0.1

[limits]
cpu_ms = 30000

[vars]
ENVIRONMENT = "production"

[triggers]
# Daily ingest at 06:00 UTC
crons = ["0 6 * * *"]

[[d1_databases]]
binding = "DB"
database_name = "high-signal-db"
# Replace after `wrangler d1 create high-signal-db`
database_id = "ebeab72b-61ab-4588-936c-1da6652a2ce4"
migrations_dir = "../../packages/db/migrations"
